name: E2E

# Run the Playwright scientist smoke flow on any PR that touches the
# user-facing app surface or the Playwright plumbing itself. Keeping
# the path filter narrow stops every docs/content tweak from booting
# a full Next.js dev server just to re-prove the smoke.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    paths:
      - "src/app/**"
      - "src/components/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - ".github/workflows/e2e.yml"
  merge_group:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright smoke
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'ci-defer')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Pin the dev-server port so the Playwright webServer config
      # and the CI runner agree on a single address. Matches the
      # default in `playwright.config.ts`.
      FRONTEND_PORT: "3456"
      E2E_PORT: "3456"
      E2E_BASE_URL: "http://localhost:3456"
      # Decision 3A: every gbrain write path needs an attribution
      # handle. The smoke suite tags its writes as `smoke-test` so
      # a failing run is easy to spot in a brain dump.
      SCIENCESWARM_USER_HANDLE: "smoke-test"
      # Belt-and-suspenders: never ship a real key into the smoke
      # process. The test scope avoids any paid LLM path.
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright browser binaries keyed on the lockfile
      # so repeat CI runs don't re-download Chromium.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # NOTE: `bun` is intentionally NOT installed in this workflow.
      # It is only needed by the deferred `test.fixme` stretch goal
      # inside `tests/e2e/scientist-smoke.spec.ts`, which runs the
      # gbrain installer click-through. When that stub is promoted to
      # a real test, add a `setup-bun` step back here — pinned to a
      # commit hash of `oven-sh/setup-bun`. We removed the prior
      # `curl https://bun.sh/install | bash` step (Greptile P2) to
      # avoid piping a remote script into a shell on CI.

      - name: Run Playwright smoke
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

name: Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: desktop-installers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            package-script: desktop:pack:mac
            artifact-platform: macos
            artifact-name: scienceswarm-macos-dmg
            artifact-path: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/SHA256SUMS.txt
          - name: Windows NSIS
            os: windows-latest
            package-script: desktop:pack:win
            artifact-platform: windows
            artifact-name: scienceswarm-windows-nsis
            artifact-path: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/SHA256SUMS.txt
          - name: Linux AppImage
            os: ubuntu-latest
            package-script: desktop:pack:linux
            artifact-platform: linux
            artifact-name: scienceswarm-linux-appimage
            artifact-path: |
              dist/*.AppImage
              dist/*.AppImage.zsync
              dist/SHA256SUMS.txt

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      SCIENCESWARM_DESKTOP_ARTIFACT_PLATFORM: ${{ matrix.artifact-platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build standalone app bundle
        run: npm run build:standalone

      - name: Check desktop signing environment
        run: npm run desktop:check-signing-env
        env:
          SCIENCESWARM_DESKTOP_SIGNING_TARGET: ${{ matrix.os }}
          SCIENCESWARM_REQUIRE_DESKTOP_SIGNING: ${{ vars.SCIENCESWARM_REQUIRE_DESKTOP_SIGNING || '0' }}

      - name: Build desktop installer
        run: npm run ${{ matrix.package-script }}

      - name: Generate installer checksums
        run: npm run desktop:checksums

      - name: Verify installer artifacts
        run: npm run desktop:verify-artifacts

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 14
          if-no-files-found: error

      - name: Upload installer asset to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SCIENCESWARM_ALLOW_PUBLISHED_RELEASE_UPLOADS: ${{ vars.SCIENCESWARM_ALLOW_PUBLISHED_RELEASE_UPLOADS || '0' }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          release_draft_state() {
            gh release view "$tag" --json isDraft --jq '.isDraft'
          }

          if ! release_is_draft="$(release_draft_state 2>/dev/null)"; then
            if gh release create "$tag" \
              --verify-tag \
              --draft \
              --title "$tag" \
              --notes "Unsigned ScienceSwarm desktop installer artifacts."; then
              release_is_draft="true"
            elif release_is_draft="$(release_draft_state 2>/dev/null)" && [ "$release_is_draft" = "true" ]; then
              echo "Draft release already exists for $tag; continuing after matrix create race."
            else
              echo "Failed to create or find a draft GitHub Release for $tag." >&2
              exit 1
            fi
          fi

          if [ "$release_is_draft" != "true" ] && [ "$SCIENCESWARM_ALLOW_PUBLISHED_RELEASE_UPLOADS" != "1" ]; then
            echo "Release $tag is already published; refusing to upload unsigned installer assets." >&2
            echo "Set SCIENCESWARM_ALLOW_PUBLISHED_RELEASE_UPLOADS=1 to intentionally update a published release." >&2
            exit 1
          fi

          checksum_asset="dist/SHA256SUMS-${SCIENCESWARM_DESKTOP_ARTIFACT_PLATFORM}.txt"
          cp dist/SHA256SUMS.txt "$checksum_asset"

          shopt -s nullglob
          assets=(
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.AppImage
            dist/*.AppImage.zsync
            "$checksum_asset"
          )

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No desktop installer assets found in dist/." >&2
            exit 1
          fi

          gh release upload "$tag" "${assets[@]}" --clobber

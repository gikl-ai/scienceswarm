name: Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: desktop-installers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            package-script: desktop:pack:mac
            artifact-name: scienceswarm-macos-dmg
            artifact-path: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/SHA256SUMS.txt
          - name: Windows NSIS
            os: windows-latest
            package-script: desktop:pack:win
            artifact-name: scienceswarm-windows-nsis
            artifact-path: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/SHA256SUMS.txt
          - name: Linux AppImage
            os: ubuntu-latest
            package-script: desktop:pack:linux
            artifact-name: scienceswarm-linux-appimage
            artifact-path: |
              dist/*.AppImage
              dist/*.AppImage.zsync
              dist/SHA256SUMS.txt

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build standalone app bundle
        run: npm run build:standalone

      - name: Build desktop installer
        run: npm run ${{ matrix.package-script }}

      - name: Generate installer checksums
        run: npm run desktop:checksums

      - name: Verify installer artifacts
        run: npm run desktop:verify-artifacts

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 14
          if-no-files-found: error

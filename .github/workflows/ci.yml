name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deferred:
    name: CI deferred
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-defer')
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Full CI is deferred while the ci-defer label is present."
          echo "Remove ci-defer when the PR is ready for final checks and merge."

  typecheck:
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'ci-defer')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  lint:
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'ci-defer')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'ci-defer')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'ci-defer')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:fast

name: Trusted Review Policy

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  trusted-review-policy:
    name: Trusted review policy
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'pull_request_review' &&
       github.event.pull_request.base.ref == 'main')
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      TRUSTED_USERS_JSON: '["vajdap","seijiyamamoto","yamamotoseiji"]'
    steps:
      - name: Evaluate trusted review policy
        shell: bash
        run: |
          set -euo pipefail

          head_sha=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.head.sha')
          labels_json=$(gh api "repos/$REPO/issues/$PR_NUMBER/labels" --paginate --slurp | jq -c 'add // []')
          reviews_json=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate --slurp | jq -c 'add // []')

          ci_deferred=$(
            jq -r '
              map(.name)
              | index("ci-defer") != null
            ' <<<"$labels_json"
          )

          trusted_author=$(
            jq -rn \
              --arg author "$PR_AUTHOR" \
              --argjson trusted "$TRUSTED_USERS_JSON" \
              '$trusted | index($author) != null'
          )

          latest_trusted_reviews=$(
            jq -c \
              --arg head_sha "$head_sha" \
              --argjson trusted "$TRUSTED_USERS_JSON" '
                map(select(.user.login != null and .commit_id == $head_sha))
                | sort_by(.user.login, .submitted_at // "")
                | group_by(.user.login)
                | map(last)
                | map(select(.user.login as $login | $trusted | index($login)))
              ' <<<"$reviews_json"
          )

          trusted_approvers=$(
            jq -r '
              map(select(.state == "APPROVED") | .user.login)
              | unique
              | join(",")
            ' <<<"$latest_trusted_reviews"
          )

          {
            echo "### Trusted review policy"
            echo
            echo "- PR author: \`$PR_AUTHOR\`"
            echo "- Trusted maintainers: \`vajdap\`, \`seijiyamamoto\`, \`yamamotoseiji\`"
          } >>"$GITHUB_STEP_SUMMARY"

          if [[ "$ci_deferred" == "true" ]]; then
            {
              echo "- Result: fail"
              echo
              echo "The \`ci-defer\` label is present. Remove it when the PR is ready for final required checks and merge."
            } >>"$GITHUB_STEP_SUMMARY"

            echo "ci-defer label blocks merge until final required checks are requested." >&2
            exit 1
          fi

          if [[ "$trusted_author" == "true" ]]; then
            {
              echo "- Result: pass"
              echo
              echo "Author is trusted, so this PR is exempt from the extra approval requirement."
            } >>"$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ -n "$trusted_approvers" ]]; then
            {
              echo "- Result: pass"
              echo "- Trusted approver(s): \`$trusted_approvers\`"
            } >>"$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "- Result: fail"
            echo
            echo "This PR needs an approving review from one of the trusted maintainers."
            echo
            echo "Latest trusted review states:"
            jq -r '
              if length == 0 then
                "- none yet"
              else
                .[] | "- \(.user.login): \(.state)"
              end
            ' <<<"$latest_trusted_reviews"
          } >>"$GITHUB_STEP_SUMMARY"

          echo "Missing approving review from vajdap, seijiyamamoto, or yamamotoseiji." >&2
          exit 1

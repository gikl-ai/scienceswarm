name: Bug report
description: Report a reproducible defect in ScienceSwarm.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please include enough
        detail that a maintainer can reproduce the issue without asking
        follow-up questions.

        If this is a security issue, stop and follow [SECURITY.md](../../SECURITY.md)
        instead — do not post exploit details in a public issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened?
      placeholder: |
        When I run `./start.sh`, the OpenHands container fails to start with
        "cannot find image". I expected it to pull the image on first run.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps someone else can follow to hit the same bug.
      placeholder: |
        1. Fresh clone, `npm ci`
        2. Copy `.env.example` to `.env`, add `OPENAI_API_KEY`
        3. Run `./start.sh`
        4. Observe the error in `/tmp/openhands.log`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      description: Full error text (not a screenshot). Paste inside the code block.
      render: shell

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11 WSL2"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: "v22.22.0"
    validations:
      required: true

  - type: input
    id: sha
    attributes:
      label: ScienceSwarm commit SHA
      description: Output of `git rev-parse HEAD`.
      placeholder: "debf0ac"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — environment, what else is running, whether it's intermittent, etc.

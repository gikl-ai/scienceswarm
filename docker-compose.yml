services:
  openhands:
    image: ${OPENHANDS_IMAGE:-docker.openhands.dev/openhands/openhands@sha256:5c0dc26f467bf8e47a6e76308edb7a30af4084b17e23a3460b5467008b12111b}
    container_name: scienceswarm-agent
    ports:
      - "127.0.0.1:${OPENHANDS_PORT:-3000}:3000"
    environment:
      # Cloud-compatible compose defaults. For local OpenHands with
      # Ollama, layer docker-compose.local.yml on top or use ./start.sh.
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-5.4}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-32768}
      # OpenHands 1.6 resolves the sandbox (agent-server) image via
      # AGENT_SERVER_IMAGE_REPOSITORY + AGENT_SERVER_IMAGE_TAG. The
      # old 1.5 env var SANDBOX_BASE_CONTAINER_IMAGE no longer applies.
      # Build the custom image once with ./scripts/build-sandbox.sh,
      # then set these in .env to opt in. Without them OH falls back
      # to the stock ghcr.io/openhands/agent-server image.
      - AGENT_SERVER_IMAGE_REPOSITORY=${AGENT_SERVER_IMAGE_REPOSITORY:-}
      - AGENT_SERVER_IMAGE_TAG=${AGENT_SERVER_IMAGE_TAG:-}
      # Sandbox-side env forwarded via OH_AGENT_SERVER_ENV (JSON).
      # The gbrain wrapper at /usr/local/bin/gbrain reads these to
      # call back into the host /api/brain/* routes.
      - OH_AGENT_SERVER_ENV={"SCIENCESWARM_HOST_URL":"${SCIENCESWARM_HOST_URL:-http://host.docker.internal:3001}","SCIENCESWARM_SANDBOX_TOKEN":"${SCIENCESWARM_SANDBOX_TOKEN:-}"}
      - MAX_ITERATIONS=100
      - SANDBOX_TIMEOUT=300
      - LOG_ALL_EVENTS=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-data:/.openhands
      # Explicitly NOT bind-mounting ~/.gbrain or ~/.scienceswarm/projects
      # here. PGLite is single-writer and sharing `.gbrain-lock`
      # across the host and the sandbox deadlocks — PR #301 fixed
      # exactly that class of bug inside one process. The sandbox
      # reaches gbrain via HTTP through the wrapper instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scienceswarm-web
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENHANDS_URL=http://openhands:3000
      - FRONTEND_HOST=0.0.0.0
      - FRONTEND_PUBLIC_HOST=127.0.0.1
    depends_on:
      - openhands
    restart: unless-stopped

volumes:
  openhands-data:
